<!-- GSAP + ScrollTrigger + Lenis (UMD) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --obsidian:#0a0a0a;
  --charcoal:#151515;
  --platinum:#e8e4de;
  --gold:#c9a96e;
  --gold-bright:#e3c894;
  --cream:#f5f0eb;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
::selection { background:rgba(201,169,110,0.3); color:var(--cream); }
::-webkit-scrollbar { width:0; background:transparent; }

html { scroll-behavior:auto; }
html.lenis, html.lenis body { height:auto; }
.lenis.lenis-smooth { scroll-behavior:auto !important; }
.lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior:contain; }
.lenis.lenis-stopped { overflow:hidden; }

body {
  font-family:'Inter', system-ui, sans-serif;
  background:var(--obsidian);
  color:var(--platinum);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  cursor:none;
}
img { display:block; max-width:100%; }

/* Grano de película */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9998;
  opacity:0.025; mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ===== CURSOR PERSONALIZADO ===== */
.cursor-dot, .cursor-ring {
  position:fixed; top:0; left:0; border-radius:50%; pointer-events:none;
  z-index:10000; transform:translate(-50%,-50%); will-change:transform;
}
.cursor-dot { width:6px; height:6px; background:var(--gold-bright); }
.cursor-ring {
  width:38px; height:38px; border:1px solid rgba(201,169,110,0.5);
  transition:width .35s var(--ease), height .35s var(--ease), background .35s var(--ease), border-color .35s var(--ease);
}
.cursor-ring.hover { width:64px; height:64px; background:rgba(201,169,110,0.08); border-color:rgba(201,169,110,0.8); }
.cursor-ring.hidden, .cursor-dot.hidden { opacity:0; }
@media(hover:none),(pointer:coarse){ body{cursor:auto;} .cursor-dot,.cursor-ring{display:none;} }

/* ===== LOADER ===== */
#loader {
  position:fixed; inset:0; z-index:11000; background:var(--obsidian);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem;
  transition:opacity 1s var(--ease), visibility 1s;
}
#loader.done { opacity:0; visibility:hidden; }
.loader-logo { font-family:'Playfair Display',serif; font-size:1.6rem; letter-spacing:.4em; color:var(--gold); opacity:0; animation:fadeUp 1s var(--ease) .2s forwards; }
.loader-bar { width:180px; height:1px; background:rgba(201,169,110,0.15); overflow:hidden; position:relative; }
.loader-bar span { position:absolute; inset:0; background:var(--gold); transform-origin:left; transform:scaleX(0); }
.loader-pct { font-size:.6rem; letter-spacing:.3em; color:rgba(232,228,222,0.35); }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ===== UTILIDADES ===== */
.glass { background:rgba(21,21,21,0.55); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(201,169,110,0.1); }
.glass-strong { background:rgba(10,10,10,0.82); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border:1px solid rgba(201,169,110,0.15); }
.text-gradient { background:linear-gradient(135deg,#c9a96e 0%,#f5f0eb 50%,#c9a96e 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.glow-line { height:1px; background:linear-gradient(90deg,transparent,rgba(201,169,110,0.6),transparent); }

@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
@keyframes pulse-slow { 0%,100%{opacity:.25;transform:scale(1)} 50%{opacity:.5;transform:scale(1.15)} }

/* ===== NAV ===== */
nav { position:fixed; top:0; left:0; width:100%; z-index:200; padding:1.6rem 2.5rem; transition:padding .6s var(--ease), background .6s var(--ease), border-color .6s var(--ease); border-bottom:1px solid transparent; }
nav.scrolled { padding:1rem 2.5rem; background:rgba(10,10,10,0.7); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-bottom-color:rgba(201,169,110,0.08); }
.nav-inner { max-width:1300px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
.logo { font-family:'Playfair Display',serif; font-size:1.35rem; letter-spacing:.18em; text-decoration:none; }
.nav-links { display:flex; gap:2.5rem; list-style:none; }
.nav-links a { font-size:.68rem; letter-spacing:.25em; text-transform:uppercase; color:rgba(232,228,222,0.5); text-decoration:none; position:relative; transition:color .4s; }
.nav-links a::after { content:''; position:absolute; left:0; bottom:-6px; width:0; height:1px; background:var(--gold); transition:width .4s var(--ease); }
.nav-links a:hover { color:var(--gold); }
.nav-links a:hover::after { width:100%; }
.menu-btn { display:none; flex-direction:column; gap:6px; background:none; border:none; padding:8px; }
.menu-btn span { width:26px; height:1px; background:var(--platinum); transition:.35s var(--ease); display:block; }
.menu-btn.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
.menu-btn.open span:nth-child(2){ opacity:0; }
.menu-btn.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }
.mobile-menu { display:none; position:fixed; inset:0; z-index:190; flex-direction:column; align-items:center; justify-content:center; gap:2.5rem; }
.mobile-menu.open { display:flex; }
.mobile-menu a { font-family:'Playfair Display',serif; font-size:1.8rem; color:rgba(232,228,222,0.8); text-decoration:none; }

/* ===== HERO ===== */
.hero { position:relative; height:100vh; min-height:640px; overflow:hidden; }
#heroCanvas { position:absolute; inset:0; width:100%; height:100%; z-index:1; }
.hero-orb { position:absolute; border-radius:50%; filter:blur(120px); animation:pulse-slow 9s ease-in-out infinite; z-index:0; }
.hero-orb-1 { width:600px; height:600px; top:-10%; left:5%; background:rgba(201,169,110,0.06); }
.hero-orb-2 { width:480px; height:480px; bottom:-5%; right:0; background:rgba(120,90,200,0.04); animation-delay:4s; }
.hero-vignette { position:absolute; inset:0; z-index:2; pointer-events:none; background:radial-gradient(ellipse at center,transparent 35%,rgba(10,10,10,0.55) 100%); }
.hero-content { position:absolute; inset:0; z-index:3; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; pointer-events:none; }
.hero-eyebrow { font-size:.65rem; letter-spacing:.5em; text-transform:uppercase; color:rgba(201,169,110,0.6); margin-bottom:2rem; overflow:hidden; }
.hero h1 { font-family:'Playfair Display',serif; font-weight:400; line-height:.95; margin-bottom:1.5rem; }
.hero h1 .line { display:block; overflow:hidden; }
.hero h1 .l1 { font-size:clamp(3rem,11vw,8rem); }
.hero h1 .l2 { font-size:clamp(1.4rem,4.5vw,3rem); font-style:italic; font-weight:300; color:rgba(232,228,222,0.85); }
.hero h1 .word { display:inline-block; }
.hero-desc { font-size:clamp(.9rem,2vw,1.1rem); font-weight:200; color:rgba(232,228,222,0.4); max-width:480px; line-height:1.8; margin-bottom:2.8rem; }
.hero-cta { pointer-events:auto; display:inline-flex; align-items:center; gap:.8rem; padding:1.1rem 2.6rem; border-radius:100px; font-size:.68rem; letter-spacing:.25em; text-transform:uppercase; color:var(--gold); text-decoration:none; border:1px solid rgba(201,169,110,0.25); transition:background .5s var(--ease), transform .4s var(--ease); }
.hero-cta:hover { background:rgba(201,169,110,0.1); }
.hero-scroll { position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%); z-index:3; display:flex; flex-direction:column; align-items:center; gap:.8rem; }
.hero-scroll span { font-size:.55rem; letter-spacing:.3em; text-transform:uppercase; color:rgba(232,228,222,0.3); }
.scroll-line { width:1px; height:50px; background:linear-gradient(180deg,rgba(201,169,110,0.6),transparent); position:relative; overflow:hidden; }
.scroll-line::after { content:''; position:absolute; top:0; left:0; width:100%; height:40%; background:var(--gold); animation:scrollDown 2.2s var(--ease) infinite; }
@keyframes scrollDown { 0%{transform:translateY(-100%)} 100%{transform:translateY(250%)} }
.webgl-fallback { position:absolute; inset:0; z-index:1; display:none; align-items:center; justify-content:center; }
.webgl-fallback .bottle-css { width:120px; height:200px; border-radius:14px; background:linear-gradient(160deg,rgba(201,169,110,0.3),rgba(201,169,110,0.08),rgba(10,10,10,0.85)); border:1px solid rgba(255,255,255,0.1); box-shadow:0 40px 100px rgba(201,169,110,0.2); animation:float 6s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }

/* ===== SCROLL STORY ===== */
.story { position:relative; padding:6rem 2rem; }
.story-scene { max-width:820px; margin:0 auto; min-height:90vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.story-num { font-size:.6rem; letter-spacing:.5em; color:rgba(201,169,110,0.4); margin-bottom:1.5rem; }
.story-scene h2 { font-family:'Playfair Display',serif; font-size:clamp(2rem,6vw,4rem); color:rgba(232,228,222,0.92); line-height:1.1; margin-bottom:1.8rem; }
.story-scene p { font-size:clamp(1rem,2vw,1.2rem); font-weight:200; color:rgba(232,228,222,0.45); line-height:1.9; max-width:580px; margin-bottom:1.5rem; }
.story-scene .accent { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(1.1rem,2.5vw,1.5rem); color:rgba(201,169,110,0.8); }
.story-word { display:inline-block; }

/* ===== CATÁLOGO ===== */
.catalog { padding:7rem 2rem; max-width:1340px; margin:0 auto; }
.section-header { text-align:center; margin-bottom:4rem; }
.section-label { font-size:.65rem; letter-spacing:.45em; text-transform:uppercase; color:rgba(201,169,110,0.5); margin-bottom:1.2rem; }
.section-title { font-family:'Playfair Display',serif; font-size:clamp(2.4rem,6vw,4.5rem); margin-bottom:1.2rem; }
.section-desc { font-size:1rem; font-weight:200; color:rgba(232,228,222,0.35); max-width:460px; margin:0 auto; line-height:1.8; }
.tabs { display:flex; justify-content:center; gap:.5rem; margin-bottom:3.5rem; }
.tab-btn { padding:.85rem 2.2rem; border-radius:100px; border:1px solid transparent; background:none; font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(232,228,222,0.4); transition:.4s var(--ease); font-family:'Inter',sans-serif; }
.tab-btn:hover { color:rgba(232,228,222,0.75); }
.tab-btn.active { background:rgba(201,169,110,0.12); color:var(--gold); border-color:rgba(201,169,110,0.25); }
.product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1.6rem; }
.product-card { border-radius:1.4rem; padding:1.6rem; position:relative; overflow:hidden; transition:transform .6s var(--ease), border-color .6s var(--ease), box-shadow .6s var(--ease); will-change:transform; }
.product-card::after { content:''; position:absolute; inset:0; background:linear-gradient(110deg,transparent 25%,rgba(201,169,110,0.05) 37%,transparent 63%); background-size:200% 100%; animation:shimmer 5s ease-in-out infinite; pointer-events:none; }
.product-card:hover { border-color:rgba(201,169,110,0.3); transform:translateY(-6px); box-shadow:0 30px 70px rgba(0,0,0,0.5); }
.card-visual { height:220px; display:flex; align-items:center; justify-content:center; position:relative; margin-bottom:1.5rem; border-radius:1rem; overflow:hidden; }
.card-visual img { max-height:195px; object-fit:contain; position:relative; z-index:1; transition:transform .8s var(--ease); filter:drop-shadow(0 14px 36px rgba(0,0,0,0.55)); }
.product-card:hover .card-visual img { transform:scale(1.1) translateY(-6px); }
.card-glow { position:absolute; width:160px; height:160px; border-radius:50%; opacity:.18; filter:blur(40px); transition:opacity .6s; }
.product-card:hover .card-glow { opacity:.4; }
.img-fallback { width:90px; height:150px; border-radius:10px; background:linear-gradient(150deg,rgba(201,169,110,0.22),rgba(10,10,10,0.85)); border:1px solid rgba(255,255,255,0.08); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:.6rem; gap:.3rem; }
.img-fallback .fb-brand { font-size:.5rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(201,169,110,0.6); }
.img-fallback .fb-name { font-family:'Playfair Display',serif; font-size:.7rem; color:rgba(232,228,222,0.55); line-height:1.2; }
.card-brand { font-size:.6rem; letter-spacing:.32em; text-transform:uppercase; color:rgba(201,169,110,0.45); margin-bottom:.4rem; }
.card-name { font-family:'Playfair Display',serif; font-size:1.15rem; color:rgba(232,228,222,0.88); margin-bottom:.4rem; transition:color .4s; }
.product-card:hover .card-name { color:var(--gold); }
.card-type { font-size:.72rem; font-weight:300; color:rgba(232,228,222,0.28); }
.card-discover { margin-top:1.1rem; display:flex; align-items:center; gap:.5rem; font-size:.58rem; letter-spacing:.25em; text-transform:uppercase; color:rgba(201,169,110,0.5); opacity:0; transform:translateY(8px); transition:.5s var(--ease); }
.product-card:hover .card-discover { opacity:1; transform:translateY(0); }

/* ===== MODAL ===== */
.modal-overlay { position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center; padding:1.2rem; opacity:0; pointer-events:none; transition:opacity .45s var(--ease); }
.modal-overlay.open { opacity:1; pointer-events:auto; }
.modal-bg { position:absolute; inset:0; background:rgba(8,8,8,0.9); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); }
.modal-content { position:relative; max-width:840px; width:100%; max-height:90vh; overflow-y:auto; border-radius:1.6rem; padding:3.2rem; transform:translateY(40px) scale(0.96); transition:transform .55s var(--ease); }
.modal-overlay.open .modal-content { transform:translateY(0) scale(1); }
.modal-close { position:absolute; top:1.4rem; right:1.4rem; width:42px; height:42px; border-radius:50%; border:1px solid rgba(232,228,222,0.12); background:none; color:rgba(232,228,222,0.55); font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:.3s; }
.modal-close:hover { border-color:rgba(201,169,110,0.4); color:var(--gold); transform:rotate(90deg); }
.modal-grid { display:grid; grid-template-columns:1fr 1.1fr; gap:3rem; align-items:center; }
.modal-bottle-wrap { display:flex; align-items:center; justify-content:center; position:relative; min-height:300px; }
.modal-bottle-wrap img { max-height:300px; object-fit:contain; animation:float 6s ease-in-out infinite; filter:drop-shadow(0 24px 60px rgba(0,0,0,0.65)); position:relative; z-index:1; }
.modal-bottle-glow { position:absolute; width:240px; height:240px; border-radius:50%; filter:blur(70px); opacity:.28; }
.modal-brand { font-size:.65rem; letter-spacing:.4em; text-transform:uppercase; color:rgba(201,169,110,0.55); margin-bottom:.6rem; }
.modal-name { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,4vw,2.4rem); color:var(--platinum); margin-bottom:.3rem; line-height:1.1; }
.modal-type { font-size:.82rem; color:rgba(232,228,222,0.35); margin-bottom:1.8rem; }
.modal-emotion { font-family:'Playfair Display',serif; font-style:italic; font-size:1.1rem; color:rgba(232,228,222,0.68); line-height:1.7; margin-bottom:2.2rem; }
.modal-notes-title { font-size:.58rem; letter-spacing:.4em; text-transform:uppercase; color:rgba(201,169,110,0.45); margin-bottom:1rem; }
.note-row { display:flex; align-items:center; gap:1rem; padding:.55rem 0; }
.note-label { font-size:.58rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(232,228,222,0.28); width:56px; flex-shrink:0; }
.note-line { flex:1; height:1px; background:linear-gradient(90deg,rgba(201,169,110,0.25),transparent); }
.note-value { font-size:.84rem; color:rgba(232,228,222,0.58); text-align:right; }
.modal-cta { display:inline-flex; align-items:center; gap:.7rem; margin-top:2.2rem; padding:1rem 2.2rem; border-radius:100px; font-size:.66rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); text-decoration:none; border:1px solid rgba(201,169,110,0.25); transition:background .4s var(--ease); }
.modal-cta:hover { background:rgba(201,169,110,0.12); }

/* ===== PRICING ===== */
.pricing { padding:7rem 2rem; max-width:1040px; margin:0 auto; }
.pricing-grid { display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-top:3rem; }
.price-card { border-radius:1.6rem; padding:2.6rem; position:relative; }
.price-card h3 { font-family:'Playfair Display',serif; font-size:1.6rem; color:rgba(232,228,222,0.92); margin-bottom:.3rem; }
.price-card .card-sub { font-size:.85rem; color:rgba(232,228,222,0.35); margin-bottom:2rem; }
.price-row { display:flex; justify-content:space-between; align-items:center; padding:.85rem 0; border-bottom:1px solid rgba(232,228,222,0.05); }
.price-row:last-child { border-bottom:none; }
.price-qty { color:rgba(232,228,222,0.55); font-size:.9rem; }
.price-value { font-family:'Playfair Display',serif; font-size:1.25rem; color:var(--gold); text-align:right; }
.price-unit { display:block; font-family:'Inter',sans-serif; font-size:.58rem; color:rgba(232,228,222,0.25); }
.best-badge { position:absolute; top:1.2rem; right:1.2rem; padding:.35rem .9rem; border-radius:100px; background:rgba(201,169,110,0.12); border:1px solid rgba(201,169,110,0.25); font-size:.52rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); }
.pricing-note { text-align:center; font-size:.8rem; color:rgba(232,228,222,0.28); margin-top:2.2rem; }

/* ===== CONTACT ===== */
.contact { padding:7rem 2rem; max-width:840px; margin:0 auto; }
.contact-card { border-radius:1.6rem; padding:3.2rem; }
.contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:3rem; }
.contact-card h3 { font-family:'Playfair Display',serif; font-size:1.25rem; color:rgba(232,228,222,0.9); margin-bottom:1.6rem; }
.contact-link { display:flex; align-items:center; gap:.7rem; color:rgba(232,228,222,0.55); text-decoration:none; font-size:.9rem; margin-bottom:1.1rem; transition:color .3s; }
.contact-link:hover { color:var(--gold); }
.contact-link svg { color:rgba(201,169,110,0.55); flex-shrink:0; }
.payment-info p { font-size:.85rem; color:rgba(232,228,222,0.45); margin-bottom:.55rem; }
.payment-info .bank-name { color:rgba(201,169,110,0.65); }
.shipping-note { font-size:.74rem; color:rgba(232,228,222,0.25); line-height:1.65; margin-top:1
